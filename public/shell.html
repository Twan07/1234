<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shell</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <section class="hero">
          <h2>Shell</h2>
          <p>Terminal realtime theo từng project bằng <strong>xterm.js</strong> ở frontend và <strong>node-pty</strong> ở backend, nên tương tác chuẩn TTY hơn kiểu stream stdin/stdout đơn giản trước đó.</p>
        </section>

        <section class="console">
          <div id="project-picker"></div>
          <div class="row" style="margin-top: 16px; margin-bottom: 16px;">
            <button class="btn secondary" id="reconnect-shell-btn">Kết nối lại</button>
            <span class="status-chip" id="terminal-status">disconnected</span>
          </div>
          <div class="terminal-shell" id="terminal"></div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="/js/shell.js"></script>
  </body>
</html>
